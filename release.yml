name: Build Debian Package
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Build Package
        run: |
          # 1. Clean the version: remove 'v' and replace '-' with '~' for Debian compatibility
          CLEAN_VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//' | sed 's/-/~/g')
          
          mkdir -p build/DEBIAN
          mkdir -p build/usr/local/bin
          mkdir -p build/opt/crostini-killer
          mkdir -p build/usr/share/applications
          
          cp crostini-killer.py build/opt/crostini-killer/
          cp crostini-killer-config.csv build/opt/crostini-killer/
          
          # 2. Create control file
          cat <<EOF > build/DEBIAN/control
          Package: crostini-killer
          Version: ${CLEAN_VERSION}
          Section: utils
          Priority: optional
          Architecture: all
          Maintainer: cHamster24
          Description: Task killer for Crostini
          EOF

          # 3. Create launcher
          echo -e "#!/bin/bash\npython3 /opt/crostini-killer/crostini-killer.py" > build/usr/local/bin/crostini-killer
          chmod +x build/usr/local/bin/crostini-killer

          # 4. Create desktop entry
          echo -e "[Desktop Entry]\nName=Crostini Killer\nExec=crostini-killer\nTerminal=true\nType=Application\nCategories=System;" > build/usr/share/applications/crostini-killer.desktop

          # 5. Build
          dpkg-deb --build build crostini-killer.deb

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: crostini-killer.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
